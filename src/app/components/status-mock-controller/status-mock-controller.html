<div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
  <h2 class="text-sm font-semibold text-slate-700">Dev: Mock Availability Controller</h2>
  <p class="text-xs text-slate-500">Toggle facility availability for simulation purposes.</p>

  <div class="mt-3 grid gap-3 sm:grid-cols-3">
    <label class="block">
      <span class="text-xs font-medium text-slate-600">Facility</span>
      <select
        class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm"
        [(ngModel)]="selectedFacilityId"
      >
        <option [ngValue]="null">Select facility</option>
        <option *ngFor="let facility of facilities" [value]="facility.id">
          {{ facility.name }}
        </option>
      </select>
    </label>

    <label class="block">
      <span class="text-xs font-medium text-slate-600">Availability</span>
      <select
        class="mt-1 w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm"
        [(ngModel)]="selectedAvailability"
      >
        <option value="available">Available</option>
        <option value="limited">Limited</option>
        <option value="unavailable">Out of stock</option>
      </select>
    </label>

    <div class="mt-6 flex gap-2">
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-medium text-white hover:bg-indigo-700"
        (click)="applyOverride()"
        [disabled]="!selectedFacilityId"
      >
        Apply
      </button>
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-md bg-slate-100 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-200"
        (click)="clearOverride()"
        [disabled]="!selectedFacilityId"
      >
        Reset
      </button>
    </div>
  </div>

  <div *ngIf="currentOverride" class="mt-4 rounded-md bg-amber-50 p-3 text-sm text-amber-800">
    Current override: <span class="font-semibold">{{ currentOverride }}</span>
  </div>
</div>
