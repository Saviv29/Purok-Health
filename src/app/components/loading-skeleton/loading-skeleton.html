<div class="grid gap-4 md:grid-cols-2">
  @for (i of [1, 2, 3, 4]; track i) {
    <div class="animate-pulse rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 space-y-3">
          <div class="h-5 w-2/3 rounded bg-slate-200"></div>
          <div class="h-4 w-full rounded bg-slate-100"></div>
          <div class="h-3 w-1/3 rounded bg-slate-50"></div>
        </div>
        <div class="h-6 w-20 rounded-full bg-slate-100"></div>
      </div>
      <div class="mt-6 grid grid-cols-2 gap-4">
        <div class="space-y-2">
          <div class="h-3 w-1/2 rounded bg-slate-100"></div>
          <div class="h-3 w-full rounded bg-slate-50"></div>
        </div>
        <div class="space-y-2">
          <div class="h-3 w-1/2 rounded bg-slate-100"></div>
          <div class="h-3 w-full rounded bg-slate-50"></div>
        </div>
      </div>
      <div class="mt-6 h-4 w-24 rounded bg-slate-200"></div>
    </div>
  }
</div>
