<div class="mx-auto max-w-5xl px-4 py-8">
  <section class="space-y-4">
    <header class="space-y-2">
      <h1 class="text-3xl font-semibold text-slate-900">Purok-Health Service Search</h1>
      <p class="text-sm text-slate-600">
        Find health facilities in Pampanga by medicine or lab test. Use the filters to narrow your search.
      </p>
    </header>

    <app-search-bar (search)="onSearch($event)"></app-search-bar>

    <app-category-filters (select)="onCategory($event)"></app-category-filters>
  </section>

  <section class="mt-8">
    <h2 class="text-xl font-semibold text-slate-900">Search results</h2>
    <p class="mt-1 text-sm text-slate-600">
      Showing facilities in Pampanga that match your criteria.
    </p>

    <div class="mt-4">
      <app-results-list
        [facilities]="results()"
        [availabilityOverrides]="availabilityOverrides"
      ></app-results-list>
    </div>
  </section>

  <section class="mt-10">
    <app-status-mock-controller></app-status-mock-controller>
  </section>
</div>
